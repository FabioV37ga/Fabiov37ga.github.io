<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fábio Veiga - Portfólio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0C0C0C;
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 500;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .description {
            font-size: 1.1rem;
            color: #808080;
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 300;
        }

        .cta-button {
            display: inline-block;
            padding: 14px 40px;
            background-color: #FFFFFF;
            color: #0C0C0C;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 4px;
            margin-bottom: 60px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid #FFFFFF;
            font-family: 'Montserrat', sans-serif;
        }

        .cta-button:hover {
            background-color: transparent;
            color: #FFFFFF;
            transform: translateY(-2px);
        }

        .technologies {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 40px;
        }

        .tech-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px;
            background-color: #1A1A1A;
            border: 1px solid #333333;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #CCCCCC;
            transition: all 0.3s ease;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .tech-badge:hover {
            border-color: #FFFFFF;
            background-color: #2A2A2A;
            transform: translateY(-2px);
        }

        .badge-icon {
            margin-right: 6px;
            font-size: 1rem;
        }

        .loading-text {
            font-size: 0.9rem;
            color: #808080;
            margin-top: 30px;
            font-weight: 300;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .description {
                font-size: 1rem;
            }

            .technologies {
                gap: 10px;
            }

            .tech-badge {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Fábio Veiga - Portfólio</h1>
        <p class="description">
            O portfólio está hospedado em um servidor com carregamento inicial.
            <br>
            Ao acessar, aguarde alguns segundos para a vizualização.
        </p>
        <a href="https://fabioveiga.onrender.com" class="cta-button">Acessar Portfólio</a>

        <div class="technologies">
            <span class="tech-badge">
                <span class="badge-icon">&lt;/></span>HTML5
            </span>
            <span class="tech-badge">
                <span class="badge-icon">🎨</span>CSS3
            </span>
            <span class="tech-badge">
                <span class="badge-icon">◆</span>TypeScript
            </span>
            <span class="tech-badge">
                <span class="badge-icon">⚡</span>Vite
            </span>
            <span class="tech-badge">
                <span class="badge-icon">✨</span>Anime.js
            </span>
            <span class="tech-badge">
                <span class="badge-icon">☂</span>Umbrella.js
            </span>
            <span class="tech-badge">
                <span class="badge-icon">◉</span>Nanohtml
            </span>
            <span class="tech-badge">
                <span class="badge-icon">⬢</span>Node.js
            </span>
        </div>

        <p class="loading-text">Aguardando redirecionamento...</p>
    </div>
</body>

</html>
